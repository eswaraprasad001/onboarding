stages:
  - build
  - deploy

variables:
  NODE_ENV: production
  OUT_DIR: out
  AWS_DEFAULT_REGION: us-east-1

default:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.presidio.com

.aws_auth_setup: &aws_auth_setup
    - export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/web_identity_token
    - echo $GITLAB_OIDC_TOKEN > $AWS_WEB_IDENTITY_TOKEN_FILE
    - CREDENTIALS=$(aws sts assume-role-with-web-identity --role-arn $AWS_ROLE_ARN --role-session-name "GitLabRunner" --web-identity-token $GITLAB_OIDC_TOKEN --output json)
    - export AWS_ACCESS_KEY_ID=$(echo $CREDENTIALS | jq -r '.Credentials.AccessKeyId')
    - export AWS_SECRET_ACCESS_KEY=$(echo $CREDENTIALS | jq -r '.Credentials.SecretAccessKey')
    - export AWS_SESSION_TOKEN=$(echo $CREDENTIALS | jq -r '.Credentials.SessionToken')
# -----------------------
# 1️ Build
# -----------------------
build:
  stage: build
  image: node:20
  tags:
    - project-runner
  script:
    - npm ci --include=dev
    - npm run build
  artifacts:
    paths:
      - out
    expire_in: 1 hour
  only:
    - main
    - /^feat\/.*$/
    - /^feature\/.*$/


# -----------------------
# 2️ Deploy to S3
# -----------------------
deploy_to_s3:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  tags:
    - project-runner
  dependencies:
    - build
  before_script:
    - aws --version
    - *aws_auth_setup
  script:
    - aws s3 sync out/ s3://$S3_BUCKET --delete
    - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DIST_ID --paths "/*"
  only:
    - main

